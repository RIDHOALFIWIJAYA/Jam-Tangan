<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Produk</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-800 text-gray-900 font-sans">
  <div class="max-w-xl mx-auto mt-10 p-4 bg-white rounded-lg shadow">
    <h1 id="nama-produk" class="text-3xl font-bold mb-4"></h1>
    <img id="gambar-produk" class="w-full h-auto rounded mb-4" />
    <p id="deskripsi-produk" class="text-xl mb-2 font-bold"></p>
    <h3 id="harga-produk" class="text-xl font-semibold text-green-600"></h3>
    <a id="wa-button" target="_blank" class="inline-block mt-4 bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Chat via WhatsApp</a>
  </div>

 <script>
const params = new URLSearchParams(window.location.search);

const nama = params.get("nama");
const gambar = params.get("gambar");
const harga = params.get("harga");
const deskripsi = params.get("deskripsi");

if (!nama) {
  document.body.innerHTML = "<h1 class='text-center text-red-500 mt-20'>Produk tidak ditemukan</h1>";
} else {
  document.getElementById("nama-produk").textContent = nama;
  document.getElementById("gambar-produk").src = gambar;
  document.getElementById("deskripsi-produk").textContent = deskripsi;
  document.getElementById("harga-produk").textContent = harga;

  const waText = `Halo, saya tertarik dengan ${nama}`;
  document.getElementById("wa-button").href =
    "https://wa.me/6283140470146?text=" + encodeURIComponent(waText);
}
</script>

</body>
</html>
