<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Produk | JAM35</title>
  <meta name="description" id="meta-desc" content="Temukan Jam impian kamu disini.">
  <meta property="og:title" id="og-title" content="Detail Produk | JAM35">
  <meta property="og:description" id="og-desc" content="Temukan Jam impian kamu disini.">
  <meta property="og:image" id="og-image" content="">
  <style>
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal.active { display: flex; }
    input, textarea { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 12px 16px; width: 100%; color: white; outline: none; transition: border 0.3s; }
    input:focus, textarea:focus { border-color: #3b82f6; }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white min-h-screen flex flex-col items-center p-6 py-20">
  
  <!-- Wishlist Notification -->
  <div id="wishlist-toast" class="fixed top-24 right-6 bg-blue-600 text-white px-6 py-3 rounded-2xl shadow-2xl translate-x-[150%] transition-transform duration-500 z-[300] font-bold text-sm"></div>

  <div class="max-w-4xl w-full bg-white/5 border border-white/10 rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row relative">
    <!-- Wishlist Button -->
    <button onclick="toggleWishlist()" id="wishlist-btn" class="absolute top-6 right-6 z-10 w-12 h-12 glass rounded-full flex items-center justify-center text-xl hover:scale-110 transition-all">
      <span id="wishlist-icon">🤍</span>
    </button>

    <div class="md:w-1/2 p-4">
      <img id="gambar-produk" class="w-full h-[400px] object-cover rounded-2xl shadow-lg" loading="lazy" />
    </div>
    
    <div class="md:w-1/2 p-8 flex flex-col justify-center">
      <a href="produk.html" class="text-blue-500 text-sm mb-4 inline-block">&larr; Kembali ke Katalog</a>
      <h1 id="nama-produk" class="text-4xl font-black mb-2"></h1>
      <h3 id="harga-produk" class="text-2xl font-bold text-blue-400 mb-6"></h3>
      
      <div class="border-t border-white/10 pt-6">
        <p class="text-gray-400 leading-relaxed mb-8" id="deskripsi-produk"></p>
        
        <button onclick="openOrderModal()" class="flex items-center justify-center gap-3 w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-500 transition transform hover:scale-[1.02] mb-4 shadow-xl shadow-blue-600/20">
          Pesan Sekarang (Formal)
        </button>

        <div class="grid grid-cols-2 gap-4">
          <button onclick="shareToWA()" class="flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-xl text-xs font-bold hover:bg-white/10 transition">
            <span>📲</span> Share WA
          </button>
          <button onclick="copyToClipboard()" class="flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-xl text-xs font-bold hover:bg-white/10 transition">
            <span id="copy-icon">🔗</span> <span id="copy-text">Copy Link</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Order Modal -->
  <div id="orderModal" class="modal">
    <div class="glass p-1 md:p-1.5 rounded-[45px] max-w-lg w-full border-blue-500/30 relative shadow-[0_0_50px_rgba(59,130,246,0.15)]" data-aos="zoom-in">
      <div class="bg-[#0a0a0a] rounded-[40px] p-8 md:p-12 relative overflow-hidden">
        <!-- Decoration Blur -->
        <div class="absolute -top-20 -right-20 w-64 h-64 bg-blue-600/10 blur-[100px] rounded-full"></div>
        <div class="absolute -bottom-20 -left-20 w-64 h-64 bg-indigo-600/10 blur-[100px] rounded-full"></div>

        <button onclick="closeOrderModal()" class="absolute top-8 right-8 text-gray-500 hover:text-white transition-colors w-10 h-10 flex items-center justify-center rounded-full glass border-white/5 z-20">&times;</button>
        
        <div class="relative z-10">
          <div class="inline-block px-3 py-1 bg-blue-500/10 border border-blue-500/20 rounded-full text-[10px] text-blue-400 font-black uppercase tracking-widest mb-4">Secure Checkout</div>
          <h2 class="text-3xl md:text-4xl font-black mb-2 italic uppercase tracking-tighter leading-tight">Complete<br>Your Order.</h2>
          <p class="text-gray-500 text-xs mb-10 uppercase tracking-widest leading-relaxed">Silahkan isi data pengiriman Anda dengan benar untuk pembuatan invoice resmi.</p>
          
          <div class="space-y-6">
            <div class="group">
              <label class="text-[10px] uppercase tracking-[0.2em] text-gray-500 font-bold mb-3 block group-focus-within:text-blue-500 transition-colors">Nama Lengkap</label>
              <div class="relative">
                <input type="text" id="order-nama" placeholder="Masukkan nama Anda..." class="bg-white/[0.03] border-white/10 focus:border-blue-500/50 focus:bg-white/[0.06] transition-all pl-5 pr-5 py-4 rounded-2xl">
              </div>
            </div>
            
            <div class="group">
              <label class="text-[10px] uppercase tracking-[0.2em] text-gray-500 font-bold mb-3 block group-focus-within:text-blue-500 transition-colors">Alamat Lengkap</label>
              <div class="relative">
                <textarea id="order-alamat" rows="3" placeholder="Jl. Kemewahan No. 35, Kota..." class="bg-white/[0.03] border-white/10 focus:border-blue-500/50 focus:bg-white/[0.06] transition-all pl-5 pr-5 py-4 rounded-2xl resize-none"></textarea>
              </div>
            </div>

            <div class="p-6 rounded-3xl bg-gradient-to-br from-white/[0.04] to-transparent border border-white/5 space-y-3">
              <div class="flex justify-between items-center">
                <span class="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Order Summary</span>
                <span id="invoice-id" class="text-[10px] font-black text-blue-500 bg-blue-500/10 px-2 py-0.5 rounded">#INV-XXXX</span>
              </div>
              <div class="flex justify-between items-end">
                <h4 id="order-item-name" class="text-xl font-bold tracking-tight truncate max-w-[150px]">---</h4>
                <div id="order-item-price" class="text-lg font-black italic text-white">---</div>
              </div>
            </div>

            <button onclick="sendOrder()" class="group relative w-full bg-white text-black font-black py-5 rounded-[20px] hover:bg-blue-600 hover:text-white transition-all duration-500 overflow-hidden shadow-2xl">
              <span class="relative z-10 flex items-center justify-center gap-3">
                KIRIM VIA WHATSAPP 
                <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
              </span>
            </button>
            <p class="text-[9px] text-center text-gray-600 uppercase tracking-widest font-bold">Encrypted & Secure Transaction</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Related Products Section -->
  <div class="max-w-4xl w-full mt-16">
    <h2 class="text-2xl font-black mb-8 italic uppercase tracking-tight">Mungkin Kamu Suka</h2>
    <div id="related-products" class="grid grid-cols-1 sm:grid-cols-3 gap-6">
      <!-- Skeleton Loading for Related -->
      <div class="bg-white/5 p-4 rounded-2xl animate-pulse"><div class="bg-white/10 h-48 rounded-xl mb-4"></div><div class="h-4 bg-white/10 w-3/4 rounded mb-2"></div><div class="h-4 bg-white/10 w-1/2 rounded"></div></div>
      <div class="bg-white/5 p-4 rounded-2xl animate-pulse"><div class="bg-white/10 h-48 rounded-xl mb-4"></div><div class="h-4 bg-white/10 w-3/4 rounded mb-2"></div><div class="h-4 bg-white/10 w-1/2 rounded"></div></div>
      <div class="bg-white/5 p-4 rounded-2xl animate-pulse"><div class="bg-white/10 h-48 rounded-xl mb-4"></div><div class="h-4 bg-white/10 w-3/4 rounded mb-2"></div><div class="h-4 bg-white/10 w-1/2 rounded"></div></div>
    </div>
  </div>

  <!-- Floating WA Button -->
  <a href="https://wa.me/6282164605637" target="_blank" class="fixed bottom-6 right-6 z-[200] flex items-center gap-3 bg-green-500 text-black px-6 py-3 rounded-full font-bold shadow-2xl hover:bg-green-400 hover:scale-110 transition-all duration-300 group">
    <span class="hidden group-hover:block transition-all duration-300">Tanya Expert?</span>
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
  </a>

  <script>
    const params = new URLSearchParams(window.location.search);
    const nama = params.get("nama");
    const currentId = params.get("id");
    const gambar = params.get("gambar");
    const harga = params.get("harga");
    const deskripsi = params.get("deskripsi");

    // --- WISHLIST LOGIC ---
    let wishlist = JSON.parse(localStorage.getItem('jam35_wishlist') || '[]');
    
    function updateWishlistUI() {
      const isFav = wishlist.some(item => item.id === currentId);
      document.getElementById("wishlist-icon").textContent = isFav ? "❤️" : "🤍";
      document.getElementById("wishlist-btn").classList.toggle("bg-white/10", isFav);
    }

    function toggleWishlist() {
      const index = wishlist.findIndex(item => item.id === currentId);
      const toast = document.getElementById("wishlist-toast");
      
      if (index > -1) {
        wishlist.splice(index, 1);
        showToast("Dihapus dari Favorit 💔");
      } else {
        wishlist.push({ id: currentId, nama, gambar, harga, deskripsi });
        showToast("Ditambahkan ke Favorit ❤️");
      }
      
      localStorage.setItem('jam35_wishlist', JSON.stringify(wishlist));
      updateWishlistUI();
    }

    function showToast(msg) {
      const toast = document.getElementById("wishlist-toast");
      toast.textContent = msg;
      toast.style.transform = "translateX(0)";
      setTimeout(() => {
        toast.style.transform = "translateX(150%)";
      }, 3000);
    }

    // --- ORDER MODAL LOGIC ---
    function openOrderModal() {
      document.getElementById("orderModal").classList.add("active");
      document.getElementById("order-item-name").textContent = nama;
      document.getElementById("order-item-price").textContent = harga;
      const invId = "JAM-" + Math.random().toString(36).substr(2, 6).toUpperCase();
      document.getElementById("invoice-id").textContent = "#" + invId;
    }

    function closeOrderModal() {
      document.getElementById("orderModal").classList.remove("active");
    }

    function sendOrder() {
      const customerName = document.getElementById("order-nama").value;
      const customerAddress = document.getElementById("order-alamat").value;
      const invoiceId = document.getElementById("invoice-id").textContent;

      if (!customerName || !customerAddress) {
        alert("Lengkapi data kamu dulu ya!");
        return;
      }

      const waText = `*INVOICE ORDER JAM35*\n` +
                    `--------------------------\n` +
                    `*ID:* ${invoiceId}\n` +
                    `*Produk:* ${nama}\n` +
                    `*Harga:* ${harga}\n\n` +
                    `*Data Pemesan:*\n` +
                    `Nama: ${customerName}\n` +
                    `Alamat: ${customerAddress}\n` +
                    `--------------------------\n` +
                    `_Link Produk: ${window.location.href}_`;

      window.open(`https://wa.me/6282164605637?text=${encodeURIComponent(waText)}`, '_blank');
    }

    // Dynamic Meta Tags & Title
    if (nama) {
      document.title = `${nama} | JAM35 Premium Watches`;
      document.getElementById("meta-desc").setAttribute("content", deskripsi);
      document.getElementById("og-title").setAttribute("content", nama);
      document.getElementById("og-desc").setAttribute("content", deskripsi);
      document.getElementById("og-image").setAttribute("content", gambar);
      
      document.getElementById("nama-produk").textContent = nama;
      document.getElementById("gambar-produk").src = gambar;
      document.getElementById("deskripsi-produk").textContent = deskripsi;
      document.getElementById("harga-produk").textContent = harga;
      
      updateWishlistUI();
      loadRelatedProducts();
    } else {
      document.body.innerHTML = "<div class='text-center p-20'><h1 class='text-4xl font-black mb-4'>Produk Tidak Ditemukan!</h1><a href='produk.html' class='text-blue-500 font-bold'>Kembali ke Katalog</a></div>";
    }

    function getDetailUrl(p) {
      return `detail.html?id=${p.id}&nama=${encodeURIComponent(p.nama)}&gambar=${p.gambar}&harga=${p.harga}&deskripsi=${encodeURIComponent(p.deskripsi)}`;
    }

    async function fetchWithCache(url) {
      const cacheKey = 'jam35_products_cache';
      const cacheTimeKey = 'jam35_products_cache_time';
      const cacheExpiry = 60 * 60 * 1000;

      const cachedData = localStorage.getItem(cacheKey);
      const cachedTime = localStorage.getItem(cacheTimeKey);
      const now = new Date().getTime();

      if (cachedData && cachedTime && (now - cachedTime < cacheExpiry)) {
        return JSON.parse(cachedData);
      }

      try {
        const response = await fetch(url);
        const data = await response.json();
        localStorage.setItem(cacheKey, JSON.stringify(data));
        localStorage.setItem(cacheTimeKey, now.toString());
        return data;
      } catch (error) {
        if (cachedData) return JSON.parse(cachedData);
        throw error;
      }
    }

    async function loadRelatedProducts() {
      const container = document.getElementById("related-products");
      try {
        const data = await fetchWithCache('https://sheetdb.io/api/v1/dsm9o1yvodvy3');
        const filtered = data.filter(p => p.id !== currentId).sort(() => 0.5 - Math.random());
        const related = filtered.slice(0, 3);

        container.innerHTML = related.map(p => `
          <a href="${getDetailUrl(p)}" class="bg-white/5 border border-white/10 p-4 rounded-3xl hover:bg-white/10 transition-all group">
            <div class="relative overflow-hidden rounded-2xl mb-4">
              <img src="${p.gambar}" loading="lazy" class="w-full h-48 object-cover group-hover:scale-110 transition duration-500" alt="${p.nama}">
            </div>
            <h3 class="font-bold text-sm mb-1">${p.nama}</h3>
            <p class="text-blue-400 text-xs font-bold">${p.harga}</p>
          </a>
        `).join('');
      } catch (e) {
        container.innerHTML = "<p class='text-gray-500 italic text-sm'>Gagal memuat rekomendasi.</p>";
      }
    }

    function shareToWA() {
      const text = `Cek deh jam tangan keren ini: *${nama}* di JAM35! 🔥\n\nLink: ${window.location.href}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function copyToClipboard() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const icon = document.getElementById("copy-icon");
        const text = document.getElementById("copy-text");
        icon.textContent = "✅";
        text.textContent = "Copied!";
        setTimeout(() => {
          icon.textContent = "🔗";
          text.textContent = "Copy Link";
        }, 2000);
      });
    }
  </script>

</body>
</html>
