<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JamLo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>
  <style>
    body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
  </style>
</head>
<body class="bg-[#050505] text-white">

<header class="fixed top-0 w-full glass z-50 px-6 py-4 flex justify-between items-center">
  <h1 class="text-2xl font-black tracking-tighter text-blue-500">JAMLO.</h1>
  <nav class="flex gap-6">
    <a href="index.html" class="hover:text-blue-400 transition">Home</a>
    <a href="produk.html" class="px-4 py-1 bg-blue-600 rounded-full hover:bg-blue-700 transition">Catalog</a>
  </nav>
</header>

<section class="relative h-screen flex items-center justify-center text-center overflow-hidden">
  <div class="absolute inset-0 bg-gradient-to-b from-blue-900/20 via-black to-black"></div>
  <div class="relative z-10 px-6" data-aos="zoom-out">
    <span class="text-blue-500 font-mono tracking-widest uppercase text-sm mb-4 block">New Collection 2026</span>
    <h1 class="text-6xl sm:text-8xl font-black mb-6 leading-none uppercase">Beyond <br> <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-600">Time.</span></h1>
    <a href="#produk" class="mt-8 inline-block px-10 py-4 bg-white text-black font-bold rounded-full hover:scale-110 transition">Explore Collection</a>
  </div>
</section>

<section id="produk" class="px-8 py-24 bg-black">
  <div class="flex justify-between items-end mb-12">
    <h2 class="text-4xl font-bold">Featured</h2>
    <a href="produk.html" class="text-blue-500 hover:underline">View All &rarr;</a>
  </div>
  <div id="produk-featured" class="grid sm:grid-cols-3 gap-8"></div>
</section>

<script src="data.js"></script>
<script>
  const container = document.getElementById("produk-featured");
  // Tampilkan cuma 3 produk pertama di home
  produkData.slice(0, 3).forEach((p) => {
    container.innerHTML += `
      <div class="glass p-4 rounded-3xl group hover:border-blue-500 transition-all duration-500" data-aos="fade-up">
        <div class="overflow-hidden rounded-2xl mb-4">
          <img src="${p.gambar}" class="w-full h-72 object-cover group-hover:scale-110 transition duration-700">
        </div>
        <h3 class="text-xl font-bold">${p.nama}</h3>
        <p class="text-gray-400 mb-4">${p.harga}</p>
        <a href="${getDetailUrl(p)}" class="block text-center py-3 bg-white/10 rounded-xl group-hover:bg-blue-600 transition">View Details</a>
      </div>
    `;
  });
</script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>AOS.init({ duration: 1000 });</script>
</body>
</html>
