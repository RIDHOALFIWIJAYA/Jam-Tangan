<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | JamLo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body class="bg-[#0a0a0a] text-white">
  <header class="p-6 flex justify-between items-center">
    <a href="index.html" class="text-xl font-bold">&larr; Back</a>
    <input type="text" id="searchInput" placeholder="Cari jam idamanmu..." class="bg-white/10 border border-white/20 rounded-full px-6 py-2 w-64 focus:outline-none focus:border-blue-500">
  </header>

  <main class="p-8">
    <h1 class="text-4xl font-bold mb-10">Our Collection</h1>
    <div id="produk-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
  </main>

  <script src="data.js"></script>
  <script>
    const listContainer = document.getElementById("produk-list");
    const searchInput = document.getElementById("searchInput");

    function displayProduk(filter = "") {
      listContainer.innerHTML = "";
      const filtered = produkData.filter(p => p.nama.toLowerCase().includes(filter.toLowerCase()));
      
      filtered.forEach(p => {
        listContainer.innerHTML += `
          <div class="bg-white/5 border border-white/10 p-4 rounded-2xl hover:bg-white/10 transition">
            <img src="${p.gambar}" class="w-full h-48 object-cover rounded-xl mb-4">
            <span class="text-xs text-blue-500 uppercase font-bold">${p.kategori}</span>
            <h3 class="text-lg font-bold">${p.nama}</h3>
            <p class="text-gray-400 mb-4">${p.harga}</p>
            <a href="${getDetailUrl(p)}" class="block text-center py-2 bg-blue-600 rounded-lg hover:bg-blue-700 transition">Beli Sekarang</a>
          </div>
        `;
      });
    }

    searchInput.addEventListener("input", (e) => displayProduk(e.target.value));
    displayProduk(); // Load awal
  </script>
</body>
</html>
