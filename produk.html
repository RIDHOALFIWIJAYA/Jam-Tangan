    <h3 class="mt-28 font-bold text-3xl" data-aos="fade-right">Produk Dari Jam Tangan</h3>

  <section class="px-4 py-10">
    <div id="produk-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
  </section>
  <script>
const produk = [
  {
    id: "jam1",
    nama: "Jam Sport",
    gambar: "j1.png",
    harga: "Rp120K",
    deskripsi: "Jam sporty tahan air cocok outdoor"
  },
  {
    id: "jam2",
    nama: "Jam Elegan",

    harga: "Rp150K",
    deskripsi: "Jam elegan premium stylish"

  {
    id: "jam3",
    nama: "Jam Digital",
    gambar: "j3.jpg",
    harga: "Rp180K",
    deskripsi: "Jam digital modern multifungsi"
  },
  {
    id: "jam4",
    nama: "Jam Casual",
    gambar: "j4.jpg",
    harga: "Rp130K",
    deskripsi: "Jam santai untuk sehari-hari"
  }
];

const container = document.getElementById("produk-list");

produk.forEach((item) => {
  container.innerHTML += `
    <div class="bg-white rounded-2xl shadow-md overflow-hidden">
      <img src="${item.gambar}" class="w-full h-48 object-cover" />

      <div class="p-3 text-center">
        <p class="font-bold text-gray-800">${item.nama}</p>
        <p class="text-blue-500">${item.harga}</p>

        <a href="detail.html?id=${item.id}&nama=${encodeURIComponent(item.nama)}&gambar=${item.gambar}&harga=${item.harga}&deskripsi=${encodeURIComponent(item.deskripsi)}"
           class="block mt-2 bg-blue-600 text-white py-2 rounded">
           Beli
        </a>
      </div>
    </div>
  `;
});
</script>
