<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | JAM35</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
      body { font-family: 'Plus Jakarta Sans', sans-serif; }
      
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      .skeleton {
        background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
        background-size: 200% 100%;
        animation: shimmer 2s infinite linear;
      }
      @keyframes shimmer {
        from { background-position: -200% 0; }
        to { background-position: 200% 0; }
      }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex flex-col">
  
  <header class="p-6 flex justify-between items-center sticky top-0 bg-[#0a0a0a]/80 backdrop-blur-lg z-50 border-b border-white/10">
    <a href="index.html" class="text-xl font-black hover:text-blue-500 transition-colors">&larr; Back</a>
    <input type="text" id="searchInput" placeholder="Cari jam idamanmu..." class="bg-white/10 border border-white/20 rounded-full px-5 py-2 w-48 sm:w-72 focus:outline-none focus:border-blue-500 transition-colors text-sm">
  </header>

  <main class="p-8 max-w-7xl mx-auto flex-grow w-full">
    <h1 class="text-4xl font-black mb-8 italic tracking-tighter">Our Collection</h1>
    
    <div class="flex gap-3 overflow-x-auto pb-2 mb-8 scrollbar-hide" id="kategori-container">
    </div>

    <div id="produk-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>

    <div class="flex justify-center mt-12 mb-8">
      <button id="load-more-btn" onclick="renderItems()" class="hidden px-8 py-3 bg-white/5 hover:bg-blue-600 text-white font-bold rounded-full transition-all duration-300 border border-white/20 shadow-lg hover:-translate-y-1 tracking-wide">
        Tampilkan Lebih Banyak ⬇️
      </button>
    </div>
  </main>

  <script>
    const listContainer = document.getElementById("produk-list");
    const searchInput = document.getElementById("searchInput");
    const kategoriContainer = document.getElementById("kategori-container");
    const loadMoreBtn = document.getElementById("load-more-btn"); // Ambil elemen tombol

    let activeCategory = "All";
    let searchQuery = "";
    
    // Variabel Data & Pagination
    let produkData = []; 
    let categories = ["All"];
    let filteredProducts = []; // Nampung data yang udah difilter
    let currentIndex = 0; // Mulai dari jam ke-0
    const itemsPerLoad = 8; // Menampilkan 8 jam per klik

    // Fungsi pembantu buat bikin URL detail produk
    function getDetailUrl(p) {
      return `detail.html?id=${p.id}&nama=${encodeURIComponent(p.nama)}&gambar=${p.gambar}&harga=${p.harga}&deskripsi=${encodeURIComponent(p.deskripsi)}`;
    }

    // 1. FUNGSI SAKTI: Mengambil data dari Google Sheets dengan Cache!
    async function fetchWithCache(url) {
      const cacheKey = 'jam35_products_cache';
      const cacheTimeKey = 'jam35_products_cache_time';
      const cacheExpiry = 60 * 60 * 1000; // 1 jam

      const cachedData = localStorage.getItem(cacheKey);
      const cachedTime = localStorage.getItem(cacheTimeKey);
      const now = new Date().getTime();

      if (cachedData && cachedTime && (now - cachedTime < cacheExpiry)) {
        return JSON.parse(cachedData);
      }

      try {
        const response = await fetch(url);
        const data = await response.json();
        localStorage.setItem(cacheKey, JSON.stringify(data));
        localStorage.setItem(cacheTimeKey, now.toString());
        return data;
      } catch (error) {
        if (cachedData) return JSON.parse(cachedData);
        throw error;
      }
    }

    async function loadDataDariDatabase() {
      listContainer.innerHTML = Array(8).fill(0).map(() => `
        <div class="bg-white/5 border border-white/10 p-4 rounded-3xl">
          <div class="skeleton w-full h-64 rounded-2xl mb-5"></div>
          <div class="space-y-3 px-2">
            <div class="skeleton h-6 w-3/4 rounded-lg"></div>
            <div class="skeleton h-5 w-1/2 rounded-lg"></div>
          </div>
          <div class="skeleton h-12 w-full rounded-xl mt-6"></div>
        </div>
      `).join('');
      
      try {
        const dataMentah = await fetchWithCache('https://sheetdb.io/api/v1/dsm9o1yvodvy3'); 

        produkData = dataMentah.map(item => {
          return {
            id: item.id,
            nama: item.nama,
            gambar: item.gambar,
            harga: item.harga,
            kategori: item.kategori ? item.kategori.split(',').map(k => k.trim()) : ["Lainnya"],
            deskripsi: item.deskripsi
          };
        });

        categories = ["All", ...new Set(produkData.flatMap(p => p.kategori))];

        renderKategori();
        displayProduk();

      } catch (error) {
        listContainer.innerHTML = `<p class="col-span-full text-center text-red-500 font-bold mt-10">❌ Gagal memuat database. Cek koneksi internet.</p>`;
        console.error(error);
      }
    }

    // 2. Fungsi render tombol kategori
    function renderKategori() {
      kategoriContainer.innerHTML = categories.map(kat => {
        const isActive = kat === activeCategory;
        const bgClass = isActive 
          ? "bg-blue-600 text-white font-bold border-transparent" 
          : "bg-white/5 text-gray-400 border-white/10 hover:bg-white/10";
          
        return `
          <button onclick="setKategori('${kat}')" 
                  class="px-6 py-2 rounded-full border whitespace-nowrap transition-all duration-300 text-sm tracking-wide ${bgClass}">
            ${kat}
          </button>
        `;
      }).join('');
    }

    // 3. Fungsi klik kategori
    function setKategori(kat) {
      activeCategory = kat;
      renderKategori(); 
      displayProduk();  
    }

    // 4. Fungsi Setup Filter (Reset UI pas ngetik atau ganti kategori)
    function displayProduk() {
      listContainer.innerHTML = ""; // Kosongin list
      currentIndex = 0; // Kembalikan index ke 0
      
      filteredProducts = produkData.filter(p => {
        const matchSearch = p.nama.toLowerCase().includes(searchQuery.toLowerCase());
        const matchCategory = activeCategory === "All" || p.kategori.includes(activeCategory);
        return matchSearch && matchCategory;
      });
      
      if(filteredProducts.length === 0) {
         listContainer.innerHTML = "<p class='text-gray-500 col-span-full text-center mt-10 italic'>Produk tidak ditemukan.</p>";
         loadMoreBtn.classList.add("hidden"); // Sembunyiin tombol kalau kosong
         return;
      }

      // Lempar ke fungsi render items
      renderItems();
    }

    // 5. Fungsi Render Item + Logic Load More
    function renderItems() {
      // Ambil potongan data (misal: 0 sampai 8, lalu 8 sampai 16)
      const nextItems = filteredProducts.slice(currentIndex, currentIndex + itemsPerLoad);

      nextItems.forEach(p => {
        const tagHTML = p.kategori.map(kat => `
          <div class="bg-black/60 backdrop-blur-md text-[9px] text-white px-2 py-1 rounded-full uppercase tracking-widest font-bold border border-white/10 shadow-sm">
            ${kat}
          </div>
        `).join('');

        listContainer.innerHTML += `
          <div class="bg-white/5 border border-white/10 p-4 rounded-3xl hover:bg-white/10 transition-all duration-300 group hover:-translate-y-2 flex flex-col justify-between h-full">
            <div>
                <div class="relative overflow-hidden rounded-2xl mb-5">
                   <img src="${p.gambar}" loading="lazy" class="w-full h-64 object-cover transform transition duration-700 group-hover:scale-110" alt="${p.nama}">
                   <div class="absolute top-3 left-3 right-3 flex flex-wrap gap-1.5 pointer-events-none">
                     ${tagHTML}
                   </div>
                </div>
                <div class="px-2">
                  <h3 class="text-xl font-bold mb-1 tracking-tight">${p.nama}</h3>
                  <p class="text-blue-400 mb-6 font-bold text-lg">${p.harga}</p>
                </div>
            </div>
            <div class="px-2 pb-2 mt-auto">
              <a href="${getDetailUrl(p)}" class="block w-full text-center py-3 bg-blue-600 rounded-xl font-bold text-sm tracking-wider hover:bg-blue-500 transition-colors shadow-lg shadow-blue-600/20">BELI SEKARANG</a>
            </div>
          </div>
        `;
      });

      // Tambahin index untuk jatah load selanjutnya
      currentIndex += itemsPerLoad;

      // Cek apakah data udah habis ditampilin semua?
      if (currentIndex >= filteredProducts.length) {
        loadMoreBtn.classList.add("hidden"); // Habis, sembunyiin tombol
      } else {
        loadMoreBtn.classList.remove("hidden"); // Masih ada sisa, tampilin tombol
      }
    }

    // 6. Search bar event
    searchInput.addEventListener("input", (e) => {
      searchQuery = e.target.value;
      displayProduk();
    });

    // JALANKAN FUNGSI SAKTI PAS WEB DIBUKA
    loadDataDariDatabase();
  </script>

</body>
</html>
